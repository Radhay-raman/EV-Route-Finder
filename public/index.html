<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EV Route Finder</title>

  <!-- Leaflet CSS for Map -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <div class="dashboard">
    <!-- Header / Nav -->
    <header>
      <h1>EV Dashboard</h1>
      <div class="status-indicators">
        <div class="indicator" id="battery-indicator">
          <span class="icon">🔋</span>
          <span id="battery-level">70%</span>
        </div>
        <div class="indicator">
          <span class="icon">🌡️</span>
          <span id="temperature">24°C</span>
        </div>
      </div>
    </header>

    <!-- Battery Alert -->
    <div class="alert" id="battery-alert" style="display: none;">
      <div>⚠️ Charging Required! Showing nearby charging stations on map.</div>
      <div id="nearest-station-info" style="margin-top: 10px; font-weight: bold; color: #8B0000;"></div>
      <button id="route-to-nearest-btn"
        style="margin-top: 10px; padding: 8px 15px; background: #8B0000; color: white; border: 1px solid #8B0000; font-weight: bold; cursor: pointer; border-radius: 4px; display: none;">Route
        to Nearest Station</button>
    </div>

    <!-- Main Content Area -->
    <div class="main-content">

      <!-- Left Panel: Controls -->
      <div class="controls-panel">
        <h2>Plan Your Route</h2>
        <div class="input-group">
          <label for="source">Source (e.g., Delhi)</label>
          <input type="text" id="source" placeholder="Enter starting point">
        </div>

        <div class="input-group">
          <label for="destination">Destination (e.g., Gurgaon)</label>
          <input type="text" id="destination" placeholder="Enter destination">
        </div>

        <button id="find-route-btn">Find Route</button>

        <div class="route-info" id="route-info" style="display: none;">
          <h3>Route Summary</h3>
          <p>Distance: <span id="distance-val">0</span> km</p>
          <p>Estimated Usage: <span id="usage-val">0</span>% battery</p>
          <p id="battery-prediction" style="font-weight: bold; margin-top: 10px; font-size: 15px;"></p>
        </div>

        <!-- Interactive battery slider to demonstrate logic -->
        <div class="demo-controls">
          <label for="battery-slider">Simulate Battery: <span id="slider-val">70%</span></label>
          <input type="range" id="battery-slider" min="0" max="100" value="70">
        </div>
      </div>

      <!-- Right Panel: Map -->
      <div class="map-panel">
        <div id="map"></div>
      </div>
    </div>
  </div>

  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <!-- App JS -->
  <script src="app.js"></script>
</body>

</html>
